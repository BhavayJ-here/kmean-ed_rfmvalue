<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Segments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light p-4">
  <h2 class="mb-4">Customer Segmentation Dashboard</h2>
  <table class="table table-dark table-striped table-bordered" id="customerTable">
    <thead>
      <tr>
        <th>CustomerID</th>
        <th>Recency</th>
        <th>Monetary</th>
        <th>Frequency</th>
        <th>Cluster</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <script>
    fetch("http://127.0.0.1:8000/api/finaltable")
      .then(res => res.json())
      .then(data => {
        const rows = data.map(row => `<tr>
          <td>${row.CustomerID}</td>
          <td>${row.Recency.toFixed(4)}</td>
          <td>${row.Monetary.toFixed(4)}</td>
          <td>${row.Frequency.toFixed(4)}</td>
          <td>${row.Cluster}</td>
        </tr>`).join("");
        document.getElementById("tableBody").innerHTML = rows;
      });
  </script>
</body>
</html>
